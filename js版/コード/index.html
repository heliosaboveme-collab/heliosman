<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Blackjack UI - Skill Edition</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #2c3e50; color: white; }
        /* 画像が並ぶため横幅を少し広げました(400px→450px) */
        .game-area { background-color: #27ae60; padding: 20px; border-radius: 15px; width: 450px; margin: 0 auto; border: 5px solid #d4af37; }
        
        /* カード画像を並べるための設定 */
        .hand { min-height: 100px; margin: 10px; display: flex; justify-content: center; gap: 5px; }
        .card-img { width: 70px; height: auto; border-radius: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }

        button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; }
        #peek-btn { background-color: #9b59b6; color: white; }

        /* 🏆 追加：結果メッセージ用の赤文字スタイル */
        #result-message { 
            font-size: 24px; 
            font-weight: bold; 
            color: #ff4d4d; 
            margin-top: 15px; 
            min-height: 30px; 
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <h1>Blackjack - Skill Edition</h1>
    <div class="game-area">
        <p>ディーラーの合計: <span id="dealer-score">?</span></p>
        <div id="dealer-hand" class="hand"></div>
        <hr>
        <div id="player-hand" class="hand"></div>
        <p>あなたの合計: <span id="player-score">0</span></p>
        
        <button onclick="hit()">ヒット</button>
        <button onclick="stand()">スタンド</button>
        <button id="peek-btn" onclick="peek()">スキル(透視)</button>

        <div id="result-message"></div>

        <br>
        <button onclick="location.reload()" style="margin-top:20px; background:#444; color:white;">もう一度遊ぶ</button>
    </div>

    <script src="Card.js"></script>
    <script src="Deck.js"></script>
    <script src="Player.js"></script>
    <script src="main.js"></script>
</body>
</html>
